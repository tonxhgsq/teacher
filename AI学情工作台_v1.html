<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 学情工作台</title>
<style>
:root {
  --bg: #f6f4ee;
  --panel: #fffdf8;
  --green: #2f8f55;
  --green-light: #e8f5ee;
  --orange: #d4862f;
  --orange-light: #fdf0e0;
  --red: #c0392b;
  --red-light: #fdecea;
  --blue: #2980b9;
  --blue-light: #e8f4fd;
  --brown: #9b5c2e;
  --line: #e8dfd1;
  --text: #3d2b1f;
  --muted: #9b8b7a;
  --radius: 18px;
  --sidebar: 236px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* Layout */
.app { display: flex; min-height: 100vh; }
.sidebar { width: var(--sidebar); min-height: 100vh; background: var(--panel); border-right: 1px solid var(--line); position: sticky; top: 0; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; }
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.topbar { background: var(--panel); border-bottom: 1px solid var(--line); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
.content { padding: 28px; flex: 1; }

/* Sidebar */
.sidebar-header { padding: 22px 18px 16px; border-bottom: 1px solid var(--line); }
.sidebar-logo { font-size: 17px; font-weight: 700; color: var(--green); display: flex; align-items: center; gap: 8px; }
.sidebar-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
.sidebar-nav { padding: 12px 10px; flex: 1; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 12px; cursor: pointer; font-size: 14px; color: var(--muted); transition: all 0.15s; margin-bottom: 2px; }
.nav-item:hover { background: var(--bg); color: var(--text); }
.nav-item.active { background: var(--green-light); color: var(--green); font-weight: 600; }
.nav-icon { font-size: 18px; width: 24px; text-align: center; }
.sidebar-footer { padding: 14px 18px; border-top: 1px solid var(--line); }
.teacher-info { display: flex; align-items: center; gap: 10px; }
.avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--green); color: white; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0; }
.teacher-name { font-size: 14px; font-weight: 600; }
.teacher-class { font-size: 12px; color: var(--muted); }

/* Topbar */
.topbar-title { font-size: 18px; font-weight: 700; color: var(--text); }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.topbar-date { font-size: 13px; color: var(--muted); }

/* Cards */
.card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 20px; }
.card-title { font-size: 15px; font-weight: 700; margin-bottom: 14px; color: var(--text); }
.card-sub { font-size: 13px; color: var(--muted); margin-bottom: 14px; }

/* KPI Cards */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.kpi-card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 20px 22px; display: flex; align-items: center; gap: 18px; }
.kpi-icon { width: 56px; height: 56px; border-radius: 50%; display: grid; place-items: center; flex-shrink: 0; }
.kpi-icon.green { background: #4caf7d; }
.kpi-icon.orange { background: #f5a623; }
.kpi-icon.blue { background: #4a90d9; }
.kpi-icon.red { background: #e8705a; }
.kpi-label { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
.kpi-value { font-size: 28px; font-weight: 800; line-height: 1.1; color: var(--text); }
.kpi-value span { font-size: 15px; font-weight: 600; margin-left: 2px; }
.kpi-change { font-size: 12px; margin-top: 6px; color: var(--muted); }
.kpi-change .up { color: #4caf7d; font-weight: 600; }

/* Status Pills */
.pill { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.pill.red { background: var(--red-light); color: var(--red); }
.pill.orange { background: var(--orange-light); color: var(--orange); }
.pill.blue { background: var(--blue-light); color: var(--blue); }
.pill.green { background: var(--green-light); color: var(--green); }
.pill.gray { background: #f0ece6; color: var(--muted); }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
.btn-primary { background: var(--green); color: white; }
.btn-primary:hover { background: #267a49; }
.btn-secondary { background: var(--panel); color: var(--text); border: 1px solid var(--line); }
.btn-secondary:hover { background: var(--bg); }
.btn-orange { background: var(--orange); color: white; }
.btn-orange:hover { background: #c07828; }
.btn-sm { padding: 6px 12px; font-size: 13px; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Tables */
.table { width: 100%; border-collapse: collapse; }
.table th { text-align: left; font-size: 12px; color: var(--muted); font-weight: 600; padding: 8px 12px; border-bottom: 1px solid var(--line); }
.table td { padding: 12px; border-bottom: 1px solid var(--line); font-size: 14px; }
.table tr:last-child td { border-bottom: none; }
.table tr:hover td { background: var(--bg); }
.table td a { color: var(--green); cursor: pointer; text-decoration: none; font-weight: 600; }
.table td a:hover { text-decoration: underline; }

/* Grid layouts */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
.gap-16 { gap: 16px; }

/* Tabs content */
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Student list + detail layout */
.student-layout { display: grid; grid-template-columns: 280px 1fr; gap: 20px; }
.student-list-panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
.student-list-header { padding: 16px; border-bottom: 1px solid var(--line); }
.search-input { width: 100%; padding: 8px 12px; border: 1px solid var(--line); border-radius: 8px; font-size: 13px; background: var(--bg); color: var(--text); outline: none; }
.search-input:focus { border-color: var(--green); }
.student-item { display: flex; align-items: center; gap: 10px; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--line); transition: background 0.1s; }
.student-item:last-child { border-bottom: none; }
.student-item:hover { background: var(--bg); }
.student-item.active { background: var(--green-light); }
.student-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: white; flex-shrink: 0; }
.student-info { flex: 1; min-width: 0; }
.student-name { font-size: 14px; font-weight: 600; }
.student-meta { font-size: 12px; color: var(--muted); }

/* Note blocks */
.note-block { background: var(--bg); border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
.note-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.note-content { font-size: 14px; line-height: 1.6; }

/* Weak point tags */
.tag { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; margin: 3px; }
.tag.weak { background: var(--red-light); color: var(--red); }
.tag.medium { background: var(--orange-light); color: var(--orange); }
.tag.ok { background: var(--green-light); color: var(--green); }
.tag.neutral { background: #f0ece6; color: var(--muted); }

/* Upload zone */
.upload-zone { border: 2px dashed var(--line); border-radius: var(--radius); padding: 40px; text-align: center; cursor: pointer; transition: all 0.15s; }
.upload-zone:hover { border-color: var(--green); background: var(--green-light); }
.upload-icon { font-size: 40px; margin-bottom: 12px; }
.upload-text { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.upload-sub { font-size: 13px; color: var(--muted); }

/* Kanban */
.kanban { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.kanban-col { background: var(--bg); border-radius: var(--radius); padding: 14px; min-height: 300px; }
.kanban-col-header { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
.kanban-count { background: var(--line); color: var(--muted); border-radius: 20px; padding: 2px 8px; font-size: 12px; }
.kanban-card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 12px; margin-bottom: 10px; }
.kanban-card-title { font-size: 13px; font-weight: 600; margin-bottom: 6px; line-height: 1.4; }
.kanban-card-meta { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
.kanban-card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }

/* Fake chart */
.chart-bars { display: flex; align-items: flex-end; gap: 8px; height: 120px; padding: 0 4px; }
.chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
.chart-bar { width: 100%; background: var(--green); border-radius: 4px 4px 0 0; transition: height 0.3s; min-height: 4px; }
.chart-bar.orange { background: var(--orange); }
.chart-bar.red { background: var(--red); }
.chart-label { font-size: 11px; color: var(--muted); text-align: center; }
.chart-value { font-size: 12px; font-weight: 700; color: var(--text); }

/* Worksheet */
.worksheet { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 32px; font-family: "SimSun", "宋体", serif; }
.worksheet-header { text-align: center; margin-bottom: 24px; border-bottom: 2px solid #333; padding-bottom: 16px; }
.worksheet-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.worksheet-info { font-size: 13px; color: #666; display: flex; justify-content: space-between; }
.worksheet-q { margin-bottom: 20px; }
.worksheet-q-num { font-weight: 700; margin-right: 6px; }
.worksheet-line { border-bottom: 1px solid #999; margin: 8px 0; height: 24px; }

/* Toast */
.toast { position: fixed; bottom: 28px; right: 28px; background: #333; color: white; padding: 12px 20px; border-radius: 10px; font-size: 14px; z-index: 9999; opacity: 0; transform: translateY(10px); transition: all 0.2s; pointer-events: none; }
.toast.show { opacity: 1; transform: translateY(0); }

/* Empty state */
.empty-state { text-align: center; padding: 48px 24px; color: var(--muted); border: 2px dashed var(--line); border-radius: var(--radius); }
.empty-icon { font-size: 36px; margin-bottom: 12px; }
.empty-text { font-size: 15px; }

/* Loading spinner */
.loading-wrap { display: flex; align-items: center; gap: 10px; padding: 16px; color: var(--muted); font-size: 14px; }
.spinner { width: 18px; height: 18px; border: 2px solid var(--line); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Misc */
.section-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
.divider { border: none; border-top: 1px solid var(--line); margin: 20px 0; }
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-8 { gap: 8px; }
.gap-12 { gap: 12px; }
.gap-16 { gap: 16px; }
.mb-16 { margin-bottom: 16px; }
.mb-20 { margin-bottom: 20px; }
.mb-24 { margin-bottom: 24px; }
.text-muted { color: var(--muted); font-size: 13px; }
.text-sm { font-size: 13px; }
.font-bold { font-weight: 700; }
.w-full { width: 100%; }

/* Textarea */
textarea { width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 10px; font-size: 14px; font-family: inherit; background: var(--bg); color: var(--text); resize: vertical; outline: none; line-height: 1.6; }
textarea:focus { border-color: var(--green); }
select { padding: 8px 12px; border: 1px solid var(--line); border-radius: 8px; font-size: 14px; background: var(--panel); color: var(--text); outline: none; cursor: pointer; }
select:focus { border-color: var(--green); }

/* Error cause tags */
.cause-tags { display: flex; flex-wrap: wrap; gap: 8px; }
.cause-tag { padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
.cause-tag.calc { background: var(--blue-light); color: var(--blue); }
.cause-tag.read { background: var(--orange-light); color: var(--orange); }
.cause-tag.concept { background: #f3e8ff; color: #7c3aed; }
.cause-tag.model { background: var(--red-light); color: var(--red); }
.cause-tag.habit { background: #f0ece6; color: var(--muted); }
.cause-tag.selected { border-color: currentColor; }

/* Feedback status */
.feedback-row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--line); }
.feedback-row:last-child { border-bottom: none; }

/* Progress bar */
.progress-bar { height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; background: var(--green); }
.progress-fill.orange { background: var(--orange); }
.progress-fill.red { background: var(--red); }

@media print {
  .sidebar, .topbar, .no-print { display: none !important; }
  .main { display: block; }
  .content { padding: 0; }
  .tab-content { display: none !important; }
  #tab-homework { display: block !important; }
  .worksheet { border: none; padding: 0; }
}

/* Knowledge Map */
.km-layout { display: grid; grid-template-columns: 260px 1fr; gap: 20px; }
.km-sidebar { display: flex; flex-direction: column; gap: 10px; }
.km-student-card { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; cursor: pointer; transition: all 0.15s; }
.km-student-card:hover { border-color: var(--green); }
.km-student-card.active { border-color: var(--green); background: var(--green-light); }
.km-student-name { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
.km-student-weak { display: flex; flex-wrap: wrap; gap: 4px; }

.km-main { }
.km-domain { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; }
.km-domain-header { display: flex; align-items: center; gap: 10px; padding: 14px 18px; cursor: pointer; user-select: none; }
.km-domain-icon { font-size: 20px; }
.km-domain-label { font-size: 16px; font-weight: 700; flex: 1; }
.km-domain-stats { font-size: 12px; color: var(--muted); }
.km-domain-toggle { font-size: 12px; color: var(--muted); transition: transform 0.2s; }
.km-domain-toggle.open { transform: rotate(90deg); }
.km-domain-body { padding: 0 18px 16px; display: none; }
.km-domain-body.open { display: block; }

.km-category { margin-bottom: 14px; }
.km-category-label { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 8px; padding-left: 4px; }
.km-nodes { display: flex; flex-wrap: wrap; gap: 8px; }
.km-node { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; position: relative; }
.km-node.mastered { background: var(--green-light); color: var(--green); border-color: var(--green); }
.km-node.weak { background: var(--red-light); color: var(--red); border-color: var(--red); }
.km-node.partial { background: var(--orange-light); color: var(--orange); border-color: var(--orange); }
.km-node.untested { background: #f0ece6; color: var(--muted); border-color: var(--line); }
.km-node:hover { filter: brightness(0.95); }
.km-node-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.km-node-count { font-size: 11px; opacity: 0.8; }

.km-legend { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
.km-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
.km-legend-dot { width: 10px; height: 10px; border-radius: 3px; }

.km-node-tooltip { position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%); background: #333; color: white; font-size: 12px; padding: 6px 10px; border-radius: 6px; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 100; }
.km-node:hover .km-node-tooltip { opacity: 1; }

.km-action-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding: 14px 18px; background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); }
</style>
</head>
<body>
<div class="app">
<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <span>📚</span>
      <span>AI 学情工作台</span>
    </div>
    <div class="sidebar-sub">小学数学教培助手</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-item active" onclick="switchTab('dashboard', this)">
      <span class="nav-icon">📊</span><span>仪表盘</span>
    </div>
    <div class="nav-item" onclick="switchTab('students', this)">
      <span class="nav-icon">👨‍🎓</span><span>学生管理</span>
    </div>
    <div class="nav-item" onclick="switchTab('homework', this)">
      <span class="nav-icon">📄</span><span>作业生成</span>
    </div>
    <div class="nav-item" onclick="switchTab('mistakes', this)">
      <span class="nav-icon">🔍</span><span>错题分析</span>
    </div>
    <div class="nav-item" onclick="switchTab('agent', this)">
      <span class="nav-icon">🤖</span><span>接入 Agent</span>
    </div>
    <div class="nav-item" onclick="switchTab('questions', this)">
      <span class="nav-icon">🗂️</span><span>题库管理</span>
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="teacher-info">
      <div class="avatar">王</div>
      <div>
        <div class="teacher-name">王老师</div>
        <div class="teacher-class">三年级（2）班</div>
      </div>
    </div>
  </div>
</aside>
<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbar-title">仪表盘</div>
    <div class="topbar-right">
      <span class="topbar-date" id="topbar-date"></span>
      <div class="avatar" style="width:32px;height:32px;font-size:13px;">王</div>
    </div>
  </div>
  <div class="content">
    <!-- PLACEHOLDER for tab content, filled by JS -->
    <div id="tab-dashboard" class="tab-content active"></div>
    <div id="tab-knowledgemap" class="tab-content"></div>
    <div id="tab-students" class="tab-content"></div>
    <div id="tab-questions" class="tab-content"></div>
    <div id="tab-homework" class="tab-content"></div>
    <div id="tab-mistakes" class="tab-content"></div>
    <div id="tab-agent" class="tab-content"></div>
  </div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
// ============================================================
// API LAYER
// ============================================================
const API = 'http://localhost:3001/api';

const api = {
  async get(path) {
    const r = await fetch(API + path);
    return r.json();
  },
  async post(path, body) {
    const r = await fetch(API + path, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    return r.json();
  },
  async put(path, body) {
    const r = await fetch(API + path, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    return r.json();
  },
  async delete(path) {
    const r = await fetch(API + path, { method: 'DELETE' });
    return r.json();
  }
};

// 颜色映射（数据库不存 color，前端按 status 派发）
const statusColors = { 'high-risk': '#e74c3c', 'follow-up': '#e67e22', 'progress': '#2980b9', 'stable': '#27ae60' };
function withColor(s) { return { ...s, color: statusColors[s.status] || '#9b8b7a' }; }

// ============================================================
// MOCK DATA（种子数据，仅首次写入数据库用）
// ============================================================
const mockData = {
  teacher: { name: "王老师", class: "三年级（2）班", subject: "小学数学" },
  students: [
    { id: 1, name: "张小雨", grade: "三年级", status: "high-risk", color: "#e74c3c",
      weakPoints: ["分数应用题", "审题漏条件", "单位换算"],
      errorCauses: { "审题类": 45, "建模类": 30, "计算类": 25 },
      homeworkRate: 72, lastRecord: "2026-05-28",
      suggestion: "下次课重点练习分数应用题的审题步骤，建议用画图法辅助理解题意。",
      recentErrors: ["3/4 + 1/2 = 5/6（分母未通分）", "行程问题漏读速度条件", "千克与克换算错误"],
      notes: "上课注意力容易分散，需要多互动提问。家长反映在家做题时间不够。"
    },
    { id: 2, name: "李明浩", grade: "三年级", status: "follow-up", color: "#e67e22",
      weakPoints: ["应用题建模", "乘法竖式"],
      errorCauses: { "建模类": 50, "计算类": 35, "习惯类": 15 },
      homeworkRate: 88, lastRecord: "2026-05-27",
      suggestion: "乘法竖式已有进步，本周重点攻克两步应用题的解题思路。",

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function statusLabel(s) {
  const map = { 'high-risk': ['red', '需关注'], 'follow-up': ['orange', '待跟进'], 'progress': ['blue', '进步中'], 'stable': ['green', '稳定'] };
  const [cls, label] = map[s] || ['gray', s];
  return `<span class="pill ${cls}">${label}</span>`;
}

function avatarHtml(student, size = 34) {
  return `<div class="student-avatar" style="width:${size}px;height:${size}px;background:${student.color};font-size:${Math.round(size*0.38)}px;">${student.name[0]}</div>`;
}

function setDate() {
  const d = new Date();
  const days = ['日','一','二','三','四','五','六'];
  document.getElementById('topbar-date').textContent = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 周${days[d.getDay()]}`;
}

const tabTitles = {
  dashboard: '仪表盘', students: '学生管理',
  questions: '题库管理', homework: '作业生成', mistakes: '错题分析', agent: '接入 Agent'
};

function switchTab(name, el) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (el) el.classList.add('active');
  document.getElementById('topbar-title').textContent = tabTitles[name];
  currentTab = name;
  renderTab(name);
}

function renderTab(name) {
  const fns = {
    dashboard: renderDashboard,
    students: renderStudents,
    questions: renderQuestions,
    homework: renderHomework,
    mistakes: renderMistakes,
    agent: renderAgent
  };
  if (fns[name]) fns[name]();
}

function renderKMTree() {
  return mockData.knowledgeTree.map((domain, di) => {
    const allNodes = getAllNodes(domain);
    const weakCount = allNodes.filter(n => getNodeStatus(n.id) === 'weak').length;
    const masteredCount = allNodes.filter(n => getNodeStatus(n.id) === 'mastered').length;
    const isOpen = di === 0 || weakCount > 0;
    return `
      <div class="km-domain">
        <div class="km-domain-header" onclick="toggleDomain(this)">
          <span class="km-domain-icon">${domain.icon}</span>
          <span class="km-domain-label">${domain.label}</span>
          ${weakCount > 0 ? `<span class="pill red" style="font-size:11px">${weakCount} 个薄弱</span>` : ''}
          <span class="km-domain-stats">${masteredCount}/${allNodes.length} 已掌握</span>
          <span class="km-domain-toggle ${isOpen ? 'open' : ''}">▶</span>
        </div>
        <div class="km-domain-body ${isOpen ? 'open' : ''}">
          ${domain.children.map(cat => `
            <div class="km-category">
              <div class="km-category-label">${cat.label}</div>
              <div class="km-nodes">
                ${cat.children.map(node => renderKMNode(node)).join('')}
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function getAllNodes(domain) {
  const nodes = [];
  domain.children.forEach(cat => cat.children.forEach(n => nodes.push(n)));
  return nodes;
}

function getNodeStatus(nodeId) {
  if (kmSelectedStudent === null) {
    // Class view: show worst status across all students
    const statuses = mockData.students.map(s => (studentNodeStatus[s.id] || {})[nodeId] || 'untested');
    if (statuses.includes('weak')) return 'weak';
    if (statuses.includes('partial')) return 'partial';
    if (statuses.every(s => s === 'mastered')) return 'mastered';
    return 'untested';
  }
  return (studentNodeStatus[kmSelectedStudent] || {})[nodeId] || 'untested';
}

function getNodeStudentCount(nodeId, status) {
  return mockData.students.filter(s => ((studentNodeStatus[s.id] || {})[nodeId] || 'untested') === status).length;
}

function renderKMNode(node) {
  const status = getNodeStatus(node.id);
  const statusLabel = { mastered: '已掌握', partial: '部分掌握', weak: '薄弱', untested: '未测试' };
  let tooltip = '';
  if (kmSelectedStudent === null) {
    const weakStudents = mockData.students.filter(s => ((studentNodeStatus[s.id] || {})[node.id] || 'untested') === 'weak').map(s => s.name);
    tooltip = weakStudents.length > 0 ? `薄弱：${weakStudents.join('、')}` : statusLabel[status];
  } else {
    tooltip = statusLabel[status];
  }
  return `
    <div class="km-node ${status}" onclick="kmNodeClick('${node.id}', '${node.label}')">
      <div class="km-node-dot"></div>
      ${node.label}
      ${kmSelectedStudent === null && status === 'weak' ? `<span class="km-node-count">(${getNodeStudentCount(node.id, 'weak')}人)</span>` : ''}
      <div class="km-node-tooltip">${tooltip}</div>
    </div>
  `;
}

function toggleDomain(header) {
  const body = header.nextElementSibling;
  const toggle = header.querySelector('.km-domain-toggle');
  body.classList.toggle('open');
  toggle.classList.toggle('open');
}

function selectKMStudent(id) {
  kmSelectedStudent = id;
  renderKnowledgeMap();
}

function kmNodeClick(nodeId, nodeLabel) {
  if (kmSelectedStudent) {
    const current = (studentNodeStatus[kmSelectedStudent] || {})[nodeId] || 'untested';
    const cycle = { untested: 'partial', partial: 'mastered', mastered: 'weak', weak: 'untested' };
    if (!studentNodeStatus[kmSelectedStudent]) studentNodeStatus[kmSelectedStudent] = {};
    studentNodeStatus[kmSelectedStudent][nodeId] = cycle[current];
    // Sync back to student weakPoints
    syncWeakPoints(kmSelectedStudent);
    document.getElementById('km-tree').innerHTML = renderKMTree();
    showToast(`${nodeLabel} → ${['untested','partial','mastered','weak'].includes(cycle[current]) ? {untested:'未测试',partial:'部分掌握',mastered:'已掌握',weak:'薄弱'}[cycle[current]] : ''}`);
  }
}

function syncWeakPoints(studentId) {
  const s = mockData.students.find(st => st.id === studentId);
  if (!s) return;
  const nodeStatus = studentNodeStatus[studentId] || {};
  const weakNodes = [];
  mockData.knowledgeTree.forEach(domain => {
    domain.children.forEach(cat => {
      cat.children.forEach(node => {
        if (nodeStatus[node.id] === 'weak') weakNodes.push(node.label);
      });
    });
  });
  s.weakPoints = weakNodes;
  api.put('/students/' + studentId, { weakPoints: weakNodes });
}

function saveInlineRecord(id) {
  const val = document.getElementById('inline-record-' + id).value.trim();
  if (!val) { showToast('请先输入记录内容'); return; }
  const s = mockData.students.find(st => st.id === id);

  s.suggestion = val;
  api.put('/students/' + id, { lastRecord: s.lastRecord, suggestion: val });
  document.getElementById('inline-record-' + id).value = '';
  showToast('记录已保存');
  window._studentDetailTab = 'info';
  document.getElementById('student-detail').innerHTML = renderStudentDetail(s);
}

function showFeedbackPanel(id) {
  const panel = document.getElementById('feedback-panel-' + id);
  if (panel) panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

function genInlineFeedback(id) {
  const btn = document.getElementById('gen-feedback-btn-' + id);
  if (btn) { btn.disabled = true; btn.innerHTML = '<div class="spinner" style="display:inline-block"></div> 生成中...'; }
  setTimeout(() => {
    const s = mockData.students.find(st => st.id === id);
    const text = `您好！${s.name}本周在${s.weakPoints[0] || '数学'}方面${s.status==='high-risk'?'仍有困难，需要重点练习':'有所进步'}。${s.weakPoints.length ? '主要薄弱点：' + s.weakPoints.join('、') + '。' : ''}下次课将针对性出题巩固。如有问题欢迎随时沟通。`;
    mockData.feedbackDrafts[id] = { status: 'draft', text };
    document.getElementById('student-detail').innerHTML = renderStudentDetail(s);
    document.getElementById('feedback-panel-' + id).style.display = 'block';
    showToast('反馈草稿已生成');
  }, 1200);
}

function copyInlineFeedback(id) {
  const el = document.getElementById('feedback-text-' + id);
  if (el) navigator.clipboard.writeText(el.value).then(() => showToast('已复制到剪贴板'));

function kanbanCardHtml(q, stage) {
  const diffColor = { '基础': 'ok', '提升': 'medium', '挑战': 'weak' };
  return `
    <div class="kanban-card">
      <div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:6px">
        <div class="kanban-card-title" style="flex:1;margin:0">${q.content}</div>
        <button onclick="deleteQuestion(${q.id})" title="删除" style="border:none;background:none;cursor:pointer;color:var(--muted);font-size:16px;padding:0;line-height:1;flex-shrink:0" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--muted)'">×</button>
      </div>
      <div class="kanban-card-meta">答案：${q.answer}</div>
      <div class="kanban-card-tags">
        <span class="tag neutral">${q.knowledgePoint}</span>
        <span class="tag ${diffColor[q.difficulty]||'neutral'}">${q.difficulty}</span>
        <span class="tag neutral">${q.type}</span>
      </div>
      ${stage === 'ocr' ? `<button class="btn btn-secondary btn-sm w-full" onclick="moveToReview(${q.id})">AI 识别完成 →</button>` : ''}
      ${stage === 'review' ? `<button class="btn btn-primary btn-sm w-full" onclick="approveQuestion(${q.id})">✓ 审核通过入库</button>` : ''}
      ${stage === 'approved' ? `<span class="pill green" style="font-size:11px">✓ 已入库</span>` : ''}
    </div>
  `;
  qInitDragDrop();
}

function qInitDragDrop() {
  const zone = document.getElementById('q-upload-zone');
  if (!zone) return;
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.borderColor = 'var(--green)'; zone.style.background = 'var(--green-light)'; });
  zone.addEventListener('dragleave', () => { zone.style.borderColor = ''; zone.style.background = ''; });
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.style.borderColor = ''; zone.style.background = '';
    qHandleFiles(e.dataTransfer.files);
  });
}

function qTriggerUpload() {
  document.getElementById('q-file-input').click();
}

async function qHandleFiles(files) {
  if (!files || files.length === 0) return;
  const zone = document.getElementById('q-upload-zone');
  const icon = document.getElementById('q-upload-icon');
  const text = document.getElementById('q-upload-text');

  zone.style.pointerEvents = 'none';
  icon.textContent = '⏳';
  text.textContent = `AI 识别中（${files.length} 个文件）…`;

  const formData = new FormData();
  for (const f of files) formData.append('files', f);

  try {
    const resp = await fetch('http://localhost:3001/api/upload', { method: 'POST', body: formData });
    const data = await resp.json();

    let total = 0;
    let errFiles = [];
    (data.results || []).forEach(r => {
      if (r.error) {
        errFiles.push(r.file);
      } else {
        r.questions.forEach(q => {
          kanbanData['pending-ocr'].push({
            id: q.id, content: q.content, type: q.type,
            difficulty: q.difficulty, knowledgePoint: q.knowledgePoint,
            answer: q.answer, status: 'pending-ocr'
          });
        });
        total += r.count;
      }
    });

    if (total > 0) showToast(`成功识别 ${total} 道题目，已加入待识别队列`);
    if (errFiles.length > 0) showToast(`${errFiles.join('、')} 识别失败，请重试`);
  } catch (e) {
    showToast('上传失败：' + e.message);
  } finally {
    icon.textContent = '📤';
    text.textContent = '上传题目';
    zone.style.pointerEvents = '';
    document.getElementById('q-file-input').value = '';
    renderQuestions();
  }
}

function moveToReview(id) {
  const q = kanbanData['pending-ocr'].find(q => q.id === id);
  if (!q) return;
  kanbanData['pending-ocr'] = kanbanData['pending-ocr'].filter(q => q.id !== id);
  q.status = 'pending-review';
  kanbanData['pending-review'].push(q);
  api.put('/questions/' + id, { status: 'pending-review' });
  renderQuestions();
  showToast('已移至待审核');
}

function approveQuestion(id) {
  const q = kanbanData['pending-review'].find(q => q.id === id);
  if (!q) return;
  kanbanData['pending-review'] = kanbanData['pending-review'].filter(q => q.id !== id);
  q.status = 'approved';
  kanbanData['approved'].push(q);
  mockData.questions = [...kanbanData['pending-ocr'], ...kanbanData['pending-review'], ...kanbanData['approved']];
  api.put('/questions/' + id, { status: 'approved' });
  renderQuestions();
  showToast('题目已入库');
}

function deleteQuestion(id) {
  ['pending-ocr', 'pending-review', 'approved'].forEach(col => {
    kanbanData[col] = kanbanData[col].filter(q => q.id !== id);
  });
  mockData.questions = mockData.questions.filter(q => q.id !== id);
  api.delete('/questions/' + id);
  renderQuestions();
  showToast('已删除');
}

          <div class="flex items-center gap-12 mb-16">
            <span class="text-sm text-muted" style="white-space:nowrap">学生：</span>
            <select id="mistake-student" style="flex:1" onchange="mistakeChangeStudent()">
              ${mockData.students.map(st => `<option value="${st.id}" ${st.id===s.id?'selected':''}>${st.name}</option>`).join('')}
            </select>
          </div>

          <div id="mistake-upload-zone" class="upload-zone" onclick="mistakeTriggerUpload()" style="padding:24px;cursor:pointer;${sess.photoUrl?'display:none':''}">
            <div class="upload-icon">📷</div>
            <div class="upload-text">上传作业照片</div>
            <div class="upload-sub">支持 JPG/PNG · AI 自动识别题目</div>
          </div>
          <input type="file" id="mistake-file-input" accept="image/jpeg,image/png,image/webp" style="display:none" onchange="mistakeUploadPhoto(event)">

          <div id="mistake-photo-wrap" style="${sess.photoUrl?'':'display:none;'}margin-top:12px">
            <img id="mistake-photo" style="width:100%;border-radius:10px;border:1px solid var(--line)" src="${sess.photoUrl||''}" alt="作业照片">
            <button class="btn btn-secondary btn-sm" style="margin-top:8px;width:100%" onclick="mistakeClearPhoto()">更换照片</button>
          </div>
        </div>

        <div class="card">
          <div class="card-title" style="margin-bottom:10px">📍 ${s.name} · 历史薄弱点</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px">
            ${s.weakPoints.length
              ? s.weakPoints.map(w => `<span class="tag weak">${w}</span>`).join('')
              : '<span class="text-muted text-sm">暂无记录</span>'}
          </div>
        </div>
      </div>

      <!-- 右列：识别结果 + 勾选 + 分析 -->
      <div>
        <div class="card" id="mistake-main">
          ${renderMistakeMain(sess)}
        </div>
      </div>
    </div>
  `;
}

function renderMistakeMain(sess) {
  if (!sess.photoUrl) {
    return `
      <div class="empty-state" style="padding:60px">
        <div class="empty-icon">📷</div>
        <div class="empty-text">先上传作业照片</div>
        <div class="text-muted text-sm" style="margin-top:8px">系统会自动识别照片里的题目，你只需勾选哪些做错了</div>
      </div>
    `;
  }
  if (sess.ocrItems.length === 0 && !sess.analyzing) {
    return `
      <div class="empty-state" style="padding:60px">
        <div class="spinner" style="margin:0 auto 12px"></div>
        <div class="empty-text">AI 正在识别题目…</div>
      </div>
    `;
  }

  const wrongCount = sess.wrongIds.size;
  const totalCount = sess.ocrItems.length;

  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div>
        <div class="card-title" style="margin-bottom:2px">识别到的题目</div>
        <div class="text-muted text-sm">勾选学生做错的题，未勾选的视为正确</div>
      </div>
      <div class="text-sm" style="color:${wrongCount>0?'var(--red)':'var(--muted)'};font-weight:600">已选 ${wrongCount}/${totalCount} 道错题</div>
    </div>

    <div id="mistake-items">
      ${sess.ocrItems.map(item => {
        const isWrong = sess.wrongIds.has(item.id);
        return `
          <div onclick="mistakeToggleWrong(${item.id})" style="border:2px solid ${isWrong?'var(--red)':'var(--line)'};background:${isWrong?'var(--red-light)':'white'};border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;transition:all 0.15s;display:flex;align-items:flex-start;gap:12px">
            <div style="width:24px;height:24px;border-radius:6px;border:2px solid ${isWrong?'var(--red)':'#cfc6b6'};background:${isWrong?'var(--red)':'white'};flex-shrink:0;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:14px;margin-top:1px">${isWrong?'✗':''}</div>
            <div style="flex:1;font-size:14px;line-height:1.6">${escapeHtml(item.content)}</div>
          </div>
        `;
      }).join('')}
    </div>

    <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--line);display:flex;align-items:center;gap:12px">
      <button class="btn btn-primary" id="mistake-analyze-btn" onclick="mistakeAnalyze()" ${wrongCount===0?'disabled':''}>
        ${sess.analyzing ? '<span class="spinner" style="display:inline-block;margin-right:6px;width:14px;height:14px;border-width:2px"></span>分析中…' : '🧠 AI 分析薄弱点'}
      </button>
      <span class="text-sm text-muted">${wrongCount===0?'请先勾选错题':'结合学生历史档案，分析薄弱点和错因'}</span>
    </div>

    ${sess.analysis ? renderMistakeAnalysis(sess.analysis) : ''}
  `;
}

function renderMistakeAnalysis(a) {
  const causes = Object.entries(a.errorCauses || {});
  const max = Math.max(1, ...causes.map(c => c[1]));
  return `
    <div style="margin-top:18px;padding:16px;border:1px solid var(--green);border-radius:12px;background:var(--green-light)">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <span style="font-size:18px">🧠</span>
        <span style="font-size:15px;font-weight:700;color:var(--green)">AI 分析结果</span>
        ${a.fallback ? '<span class="pill orange" style="font-size:10px">规则版（AI 服务不可用）</span>' : '<span class="pill green" style="font-size:10px">AI 生成</span>'}
      </div>

      <div class="mb-16">
        <div class="note-label" style="margin-bottom:6px">诊断</div>
        <div style="font-size:14px;color:var(--text)">${escapeHtml(a.diagnosis || '')}</div>
      </div>

      <div class="mb-16">
        <div class="note-label" style="margin-bottom:8px">本次薄弱点</div>
        <div>${(a.weakPoints||[]).map(w => `<span class="tag weak">${escapeHtml(w)}</span>`).join('') || '<span class="text-muted text-sm">无</span>'}</div>
      </div>

      <div class="mb-16">
        <div class="note-label" style="margin-bottom:10px">错误原因分布</div>
        <div class="chart-bars" style="height:80px">
          ${causes.map(([k,v]) => `
            <div class="chart-bar-wrap">
              <div class="chart-value">${v}%</div>
              <div class="chart-bar ${v===max?'red':'orange'}" style="height:${Math.round(v/max*55)}px"></div>
              <div class="chart-label">${k}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="mb-16">
        <div class="note-label" style="margin-bottom:6px">改进建议</div>
        <div style="font-size:14px;color:var(--text)">${escapeHtml(a.suggestion || '')}</div>
      </div>

      <div style="display:flex;gap:8px;padding-top:12px;border-top:1px solid var(--line)">
        <button class="btn btn-primary btn-sm" onclick="mistakeCommit()">✅ 确认并写入档案</button>
        <button class="btn btn-secondary btn-sm" onclick="mistakeAnalyze()">🔄 重新分析</button>
      </div>
    </div>
  `;
}

function escapeHtml(s) {
  return String(s||'').replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
}

function mistakeChangeStudent() {
  const sid = parseInt(document.getElementById('mistake-student').value);
  currentStudent = mockData.students.find(st => st.id === sid);
  renderMistakes();
}

function mistakeTriggerUpload() {
  document.getElementById('mistake-file-input').click();
}

async function mistakeUploadPhoto(e) {
  const file = e.target.files[0];
  if (!file) return;

  // 预览
  const reader = new FileReader();
  reader.onload = (ev) => {
    mistakeSession.photoUrl = ev.target.result;
    document.getElementById('mistake-photo').src = ev.target.result;
    document.getElementById('mistake-upload-zone').style.display = 'none';
    document.getElementById('mistake-photo-wrap').style.display = 'block';
    refreshMistakeMain();
  };
  reader.readAsDataURL(file);

  // 上传到后端 OCR
  mistakeSession.ocrItems = [];
  mistakeSession.wrongIds = new Set();
  mistakeSession.analysis = null;
  refreshMistakeMain();

  const fd = new FormData();
  fd.append('photo', file);
  try {
    const resp = await fetch('http://localhost:3001/api/mistakes/ocr', { method:'POST', body: fd });
    const data = await resp.json();
    if (!data.ok) throw new Error(data.error || 'OCR 失败');
    mistakeSession.ocrItems = data.items || [];
    if (mistakeSession.ocrItems.length === 0) {
      showToast('未识别到题目，请尝试更清晰的照片');
    } else {
      showToast(`识别到 ${mistakeSession.ocrItems.length} 道题目`);
    }
  } catch(err) {
    showToast('识别失败：' + err.message);
  }
  refreshMistakeMain();
}

function mistakeClearPhoto() {
  mistakeSession.photoUrl = null;
  mistakeSession.ocrItems = [];
  mistakeSession.wrongIds = new Set();
  mistakeSession.analysis = null;
  document.getElementById('mistake-photo').src = '';
  document.getElementById('mistake-upload-zone').style.display = '';
  document.getElementById('mistake-photo-wrap').style.display = 'none';
  document.getElementById('mistake-file-input').value = '';
  refreshMistakeMain();
}

function mistakeToggleWrong(id) {
  if (mistakeSession.wrongIds.has(id)) mistakeSession.wrongIds.delete(id);
  else mistakeSession.wrongIds.add(id);
  // 勾选变化后清掉旧分析（可重新分析）
  mistakeSession.analysis = null;
  refreshMistakeMain();
}

async function mistakeAnalyze() {
  const sess = mistakeSession;
  if (sess.wrongIds.size === 0) { showToast('请先勾选错题'); return; }
  sess.analyzing = true;
  sess.analysis = null;
  refreshMistakeMain();

  const wrongTexts = sess.ocrItems.filter(it => sess.wrongIds.has(it.id)).map(it => it.content);
  try {
    const resp = await fetch('http://localhost:3001/api/mistakes/analyze', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ studentId: sess.studentId, wrongTexts })
    });
    const data = await resp.json();
    if (!data.ok) throw new Error(data.error || '分析失败');
    sess.analysis = data;
    if (data.fallback) showToast('AI 服务暂不可用，已用规则版分析');
  } catch(err) {
    showToast('分析失败：' + err.message);
  }
  sess.analyzing = false;
  refreshMistakeMain();
}

async function mistakeCommit() {
  const sess = mistakeSession;
  if (!sess.analysis) return;
  const wrongTexts = sess.ocrItems.filter(it => sess.wrongIds.has(it.id)).map(it => it.content);
  try {
    const resp = await fetch('http://localhost:3001/api/mistakes/commit', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        studentId: sess.studentId,
        weakPoints: sess.analysis.weakPoints,
        errorCauses: sess.analysis.errorCauses,
        wrongTexts
      })
    });
    const data = await resp.json();
    if (!data.ok) throw new Error(data.error || '保存失败');

    // 同步前端学生档案
    const s = mockData.students.find(st => st.id === sess.studentId);
    if (s) {
      s.weakPoints = data.weakPoints;
      s.errorCauses = sess.analysis.errorCauses;
      wrongTexts.forEach(t => {
        const desc = t.length > 30 ? t.slice(0,30)+'…' : t;
        if (!s.recentErrors.includes(desc)) s.recentErrors.unshift(desc);
      });
      s.recentErrors = s.recentErrors.slice(0,10);
    }
    sess.saved = true;
    showToast(`✅ ${s.name} 学情档案已更新（薄弱点：${data.weakPoints.length} 个）`);
  } catch(err) {
    showToast('保存失败：' + err.message);
  }
}

function refreshMistakeMain() {
  const el = document.getElementById('mistake-main');
  if (el) el.innerHTML = renderMistakeMain(mistakeSession);
}

// ============================================================
// INIT
// ============================================================
async function seedIfEmpty(students, questions) {
  // 首次使用：把 mock 数据写入数据库
  if (students.length === 0) {
    for (const s of mockData.students) {
      await api.post('/students', {
        name: s.name, grade: s.grade, status: s.status,
        weakPoints: s.weakPoints, errorCauses: s.errorCauses,
        homeworkRate: s.homeworkRate, lastRecord: s.lastRecord,
        recentErrors: s.recentErrors, notes: s.notes, suggestion: s.suggestion
      });
    }
    students = await api.get('/students');
  }
  if (questions.length === 0) {
    for (const q of mockData.questions) {
      await api.post('/questions', {
        content: q.content, type: q.type, difficulty: q.difficulty,
        knowledgePoint: q.knowledgePoint, answer: q.answer, status: q.status
      });
    }
    questions = await api.get('/questions');
  }
  return { students, questions };
}

document.addEventListener('DOMContentLoaded', async () => {
  setDate();
  try {
    let [students, questions] = await Promise.all([
      api.get('/students'),
      api.get('/questions')
    ]);
    ({ students, questions } = await seedIfEmpty(students, questions));
    mockData.students = students.map(withColor);
    mockData.questions = questions;
    kanbanData = {
      'pending-ocr': mockData.questions.filter(q => q.status === 'pending-ocr'),
      'pending-review': mockData.questions.filter(q => q.status === 'pending-review'),
      'approved': mockData.questions.filter(q => q.status === 'approved')
    };
    currentStudent = mockData.students[0];
  } catch (e) {
    console.warn('API unavailable, using mock data:', e.message);
    currentStudent = mockData.students[0];
    kanbanData = {
      'pending-ocr': mockData.questions.filter(q => q.status === 'pending-ocr'),
      'pending-review': mockData.questions.filter(q => q.status === 'pending-review'),
      'approved': mockData.questions.filter(q => q.status === 'approved')
    };
  }
  renderDashboard();
});
</script>
